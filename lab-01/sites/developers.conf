<VirtualHost *:80>
  # http://developers
  ServerName developers
  # http://www.developers
  ServerAlias www.developers

  DocumentRoot /var/www/developers

  <Directory /var/www/developers>
    # Permite que Apache lea archivos .htaccess
    AllowOverride All
    # Cualquier persona puede acceder
    Require all granted
  </Directory>
</VirtualHost>