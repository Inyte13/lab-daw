<VirtualHost *:80>
  # http://webapp
  ServerName webapp
  # http://www.webapp
  ServerAlias www.webapp

  DocumentRoot /var/www/webapp

  <Directory /var/www/webapp>
    # Permite que Apache lea archivos .htaccess
    AllowOverride All
    # Cualquier persona puede acceder
    Require all granted
  </Directory>
</VirtualHost>