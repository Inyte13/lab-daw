<!DOCTYPE html>
<html>
<head>
    <title>Mi Laboratorio 03</title>
</head>
<body>
    <h1>¡Hola desde el archivo HTML!</h1>
    <p>Esta página es servida por Express.</p>
    
    <form action="/guardar" method="POST">
        <label>Nombres:</label>
        <input type="text" name="nombres" placeholder="Juan Enrique" required>
        <label>Apellidos:</label>
        <input type="text" name="apellidos" placeholder="Apaza Lima" required>
        <label>Fecha (YYYY.MM.DD):</label>
        <input type="text" name="fecha" placeholder="2026.05.10" required>
        
        <label>Hora (HH.mm):</label>
        <input type="text" name="hora" placeholder="11.00" required>
        
        <label>Evento:</label>
        <textarea name="contenido" placeholder="Descripción de la reunión"></textarea>
        
        <button type="submit">Guardar en Agenda</button>
    </form>
</body>
</html>
